<!-- hero-slideshow.html -->
<div class="relative mb-8 rounded-3xl overflow-hidden shadow-lg bg-gray-200" style="height: 420px; min-height: 380px;">

  <div id="ki-hero-slides-2026" class="absolute inset-0">

    <!-- Slide 1 -->
    <div class="hero-slide absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
      <img src="Angle_grinder.png"
           alt="Angle Grinder"
           class="w-full h-full object-cover">
    </div>

    <!-- Slide 2 -->
    <div class="hero-slide absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
      <img src="images/Electric_drill550.png"
           alt="Electric Drill"
           class="w-full h-full object-cover">
    </div>

    <!-- Slide 3 -->
    <div class="hero-slide absolute inset-0 opacity-0 transition-opacity duration-1000 ease-in-out">
      <img src="images/Foot_pump1.png"
           alt="Foot Pump"
           class="w-full h-full object-cover">
    </div>

  </div>

  <style>
    #ki-hero-slides-2026 .hero-slide { opacity: 0; }
    #ki-hero-slides-2026 .hero-slide.active { opacity: 1; }
    #ki-hero-slides-2026 img { object-position: center; }
  </style>

  <script>
    (function initKiHeroSlider() {
      const container = document.getElementById('ki-hero-slides-2026');
      if (!container) return;

      const slides = container.querySelectorAll('.hero-slide');
      if (slides.length === 0) return;

      let currentIndex = 0;
      const slideCount = slides.length;

      function showSlide(idx) {
        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === idx);
        });
      }

      function next() {
        currentIndex = (currentIndex + 1) % slideCount;
        showSlide(currentIndex);
      }

      showSlide(0); // Show first slide
      const autoPlay = setInterval(next, 5500); // Change every 5.5s

      container.addEventListener('remove', () => clearInterval(autoPlay), { once: true });
    })();
  </script>
</div>
