<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ki Wholesalers - AFRICA WHOLESALERS</title>
    
    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Our custom styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Header is loaded here -->
    <div id="header-placeholder"></div>

    <!-- Main content – wider container -->
    <div class="wide-container mx-auto py-8 flex gap-8 px-6 lg:px-10">
        
        <!-- Left sidebar -->
        <div id="categories-placeholder"></div>
        
        <!---------------------------------- Center content --------------------------------------->
<div class="flex-1">
    <!-- Promo banner - now a full-width slideshow -->
    <div class="hero-gradient rounded-3xl p-8 mb-8 overflow-hidden relative h-[320px] lg:h-[400px]">
        
        <!-- Simple CSS slideshow container -->
        <div class="slideshow-container absolute inset-0">
            
            <!-- Slide 1 -->
            <div class="slide fade">
                <img src="https://picsum.photos/id/1015/1200/600" 
                     alt="Slide 1" 
                     class="w-full h-full object-cover opacity-90">
            </div>
            
            <!-- Slide 2 -->
            <div class="slide fade">
                <img src="https://picsum.photos/id/1020/1200/600" 
                     alt="Slide 2" 
                     class="w-full h-full object-cover opacity-90">
            </div>
            
            <!-- Slide 3 -->
            <div class="slide fade">
                <img src="https://picsum.photos/id/1035/1200/600" 
                     alt="Slide 3" 
                     class="w-full h-full object-cover opacity-90">
            </div>
            
            <!-- Add more slides here as needed -->
            <!-- <div class="slide fade"><img src="your-image-url.jpg" class="w-full h-full object-cover opacity-90"></div> -->
        </div>

            <!-- Product cards -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-6">
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
                    <img src="https://picsum.photos/id/1015/400/250" alt="Wireless Keyboard" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <p class="font-semibold text-base line-clamp-2">Wireless Mechanical Keyboard RGB</p>
                        <p class="text-orange-600 font-bold mt-2">From $9.99</p>
                    </div>
                </div>
                <!-- ... the other 3 cards remain exactly the same ... -->
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
                    <img src="https://picsum.photos/id/201/400/250" alt="Membrane Keypad" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <p class="font-semibold text-base line-clamp-2">Industrial Membrane Keypad</p>
                        <p class="text-orange-600 font-bold mt-2">From $4.50</p>
                    </div>
                </div>
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
                    <img src="https://picsum.photos/id/301/400/250" alt="Laptop" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <p class="font-semibold text-base line-clamp-2">15.6" Business Laptop</p>
                        <p class="text-orange-600 font-bold mt-2">From $199</p>
                    </div>
                </div>
                <div class="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-all">
                    <img src="https://picsum.photos/id/401/400/250" alt="RGB Keyboard" class="w-full h-48 object-cover">
                    <div class="p-5">
                        <p class="font-semibold text-base line-clamp-2">Gaming RGB Keyboard</p>
                        <p class="text-orange-600 font-bold mt-2">From $12.99</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right sidebar -->
        <div id="you-may-like-placeholder"></div>
    </div>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-8 text-center text-sm mt-12">
        © 2026 Ki Wholesalers • Connecting Africa with Global Suppliers
    </footer>

    <!-- Scripts at the end -->
    <script src="script.js"></script>
</body>
</html>
