<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top Products</title>
  <style>
    /* Reset */
    body, h2, div {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Section styling */
    .top-products-section {
      position: relative;
      background: linear-gradient(135deg, #2e7d32, #388e3c);
      color: white;
      padding: 60px 20px;
      text-align: center;
      overflow: hidden;
    }

    .top-products-section h2 {
      font-size: 2em;
      margin-bottom: 40px;
      font-family: Arial, sans-serif;
      font-weight: bold;
    }

    /* Animated background effect */
    .top-products-section::before {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.1) 20%, transparent 60%);
      animation: moveBackground 12s linear infinite;
      z-index: 0;
    }

    @keyframes moveBackground {
      0% { transform: translate(0,0); }
      50% { transform: translate(60px,60px); }
      100% { transform: translate(0,0); }
    }

    /* Product container */
    .products-container {
      display: flex;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    /* Product box styling */
    .product-box {
      background: white;
      color: #2e7d32;
      padding: 20px;
      width: 220px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      font-family: Arial, sans-serif;
      font-weight: bold;
      transition: transform 0.3s ease;
      text-align: center;
    }

    .product-box:hover {
      transform: translateY(-8px);
    }

    .product-box img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
      margin-bottom: 15px;
    }

    .product-title {
      font-size: 1.1em;
    }
  </style>
</head>
<body>
  <!-- Top Products Section -->
  <section class="top-products-section">
    <h2>Our Top Products</h2>
    <div class="products-container">
      <div class="product-box">
        <img src="images/product1.jpg" alt="Product One">
        <div class="product-title">Product One</div>
      </div>
      <div class="product-box">
        <img src="images/product2.jpg" alt="Product Two">
        <div class="product-title">Product Two</div>
      </div>
      <div class="product-box">
        <img src="images/product3.jpg" alt="Product Three">
        <div class="product-title">Product Three</div>
      </div>
      <div class="product-box">
        <img src="images/product4.jpg" alt="Product Four">
        <div class="product-title">Product Four</div>
      </div>
    </div>
  </section>

  <!-- Optional JS for future interactivity -->
  <script>
    // Currently unused, but you can add product carousel or dynamic loading here
  </script>
</body>
</html>
